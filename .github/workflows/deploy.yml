name: Deploy Server to Production

concurrency:
  group: server-deployment-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches:
      - dev-new

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy secure-stay-server to EC2
        uses: appleboy/ssh-action@v1
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_REDIRECT_URI: ${{ secrets.REDDIT_REDIRECT_URI }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script_stop: true
          command_timeout: 40m
          envs: REDDIT_CLIENT_ID,REDDIT_CLIENT_SECRET,REDDIT_REDIRECT_URI
          script: |
            set -e

            echo "========== Deploying secure-stay-server =========="
            cd /home/ec2-user/secure_stay/secure-stay-server || { echo "❌ Failed to change directory"; exit 1; }

            echo ">>> Pulling latest code from dev-new..."
            git pull origin dev-new || { echo "❌ Git pull origin dev-new failed"; exit 1; }

            if [ -n "$REDDIT_CLIENT_ID" ] && [ -n "$REDDIT_CLIENT_SECRET" ]; then
              echo ">>> Upserting Reddit OAuth env vars..."
              REDIRECT_URI="${REDDIT_REDIRECT_URI:-https://securestay.ai/securestay_api/oauth/reddit/callback}"
              upsert_env() {
                key="$1"
                value="$2"
                if grep -q "^${key}=" .env 2>/dev/null; then
                  awk -v k="$key" -v v="$value" 'BEGIN{FS=OFS="="} $1==k{$0=k"="v} {print}' .env > .env.tmp && mv .env.tmp .env
                else
                  printf '%s=%s\n' "$key" "$value" >> .env
                fi
              }
              upsert_env REDDIT_CLIENT_ID "$REDDIT_CLIENT_ID"
              upsert_env REDDIT_CLIENT_SECRET "$REDDIT_CLIENT_SECRET"
              upsert_env REDDIT_REDIRECT_URI "$REDIRECT_URI"
              upsert_env REDDIT_USER_AGENT "SecureStay/1.0"
              upsert_env REDDIT_OAUTH_SCOPES "adsread adsedit adsconversions"
              echo ">>> Reddit OAuth env vars upserted"
            else
              echo ">>> Reddit OAuth secrets not set in GitHub; skipping env upsert"
            fi

            echo ">>> Installing dependencies..."
            npm install || { echo "❌ npm install failed"; exit 1; }

            echo ">>> Building the project..."
            npm run build || { echo "❌ Build failed"; exit 1; }

            echo ">>> Running database migrations..."
            npm run migrate || { echo "❌ Migration failed"; exit 1; }

            echo ">>> Pruning dev dependencies to reclaim disk..."
            npm prune --omit=dev || { echo "❌ npm prune failed"; exit 1; }

            echo ">>> Zero-downtime reload using ecosystem.config.js..."
            pm2 reload ecosystem.config.js || { echo "❌ PM2 reload failed"; exit 1; }

            echo ">>> Saving PM2 process list..."
            pm2 save || { echo "❌ PM2 save failed"; exit 1; }

            if grep -q '^REDDIT_REFRESH_TOKEN=.' .env 2>/dev/null && [ ! -f public/reddit-ads/last-create-summary.json ]; then
              echo ">>> Creating paused Reddit lead forms + ads (one-time)..."
              python3 scripts/createRedditLeadAds.py || { echo "⚠️ Reddit ad creation failed (non-fatal for deploy)"; }
            else
              echo ">>> Skipping Reddit ad creation (no refresh token yet, or already created)"
            fi

            echo "========== Deployment complete =========="
            pm2 list
