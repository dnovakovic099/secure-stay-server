name: Promote Learned Facts to KB

on:
  workflow_dispatch:
    inputs:
      seed_listings:
        description: "Also re-seed Hostify listing facts into KB"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  promote:
    name: Run promote script on EC2
    runs-on: ubuntu-latest
    steps:
      - name: Promote learned facts into listing Knowledge Base
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          command_timeout: 60m
          script: |
            set -e
            cd /home/ec2-user/secure_stay/secure-stay-server
            echo ">>> Pulling latest..."
            git pull origin dev-new
            echo ">>> Ensuring ts-node available..."
            npm install --no-save ts-node typescript reflect-metadata 2>/dev/null || npm install
            ARGS=""
            if [ "${{ github.event.inputs.seed_listings }}" = "true" ]; then
              ARGS="--seed"
            fi
            echo ">>> Running promoteLearnedFactsToKb.ts $ARGS"
            NODE_ENV=development npx ts-node --transpile-only src/scripts/promoteLearnedFactsToKb.ts $ARGS
            echo ">>> Done"
