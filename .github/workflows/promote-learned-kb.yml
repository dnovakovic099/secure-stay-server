name: Promote Learned Facts to KB

on:
  workflow_dispatch:
    inputs:
      seed_listings:
        description: "Also re-seed Hostify listing facts into KB"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  promote:
    name: Run promote script on EC2
    runs-on: ubuntu-latest
    steps:
      - name: Promote learned facts into listing Knowledge Base
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          command_timeout: 60m
          script: |
            set -e
            cd /home/ec2-user/secure_stay/secure-stay-server
            echo ">>> Pulling latest..."
            git pull origin dev-new
            ARGS=""
            if [ "${{ github.event.inputs.seed_listings }}" = "true" ]; then
              ARGS="--seed"
            fi
            echo ">>> Building so we can run the compiled promote script..."
            npm install
            npm run build
            echo ">>> Running promoteLearnedFactsToKb $ARGS"
            # Use compiled JS + production entity glob under dist/
            NODE_ENV=production node dist/out-tsc/scripts/promoteLearnedFactsToKb.js $ARGS
            echo ">>> Done"
